<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Random Lunch Picker</title>
    <style>
        :root {
            --bg-color: #0d0118;
            --glass-bg: rgba(22, 12, 41, 0.7);
            --glass-border: rgba(144, 76, 232, 0.2);
            --primary: #944ce8;
            --primary-hover: #b178f1;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --highlight: #00fff2;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at center, #1e0b3a 0%, #0d0118 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(to right, #944ce8, #00fff2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            filter: drop-shadow(0 2px 10px rgba(148, 76, 232, 0.5));
        }

        .container {
            display: flex;
            gap: 50px;
            background: var(--glass-bg);
            padding: 45px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            align-items: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 290px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        textarea {
            height: 180px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(148, 76, 232, 0.4);
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, #6e1cc7 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(110, 28, 199, 0.5);
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(110, 28, 199, 0.6);
        }

        button:disabled {
            background: #2d3748;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }

        button.spinning {
            animation: pulse-spin 1.5s infinite;
        }

        @keyframes pulse-spin {
            0% { box-shadow: 0 0 5px rgba(148, 76, 232, 0.5); }
            50% { box-shadow: 0 0 20px rgba(148, 76, 232, 0.8); }
            100% { box-shadow: 0 0 5px rgba(148, 76, 232, 0.5); }
        }

        .wheel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 440px;
            height: 440px;
        }

        canvas {
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 0 50px rgba(148, 76, 232, 0.3);
        }

        .pointer {
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 45px solid #ff0055; 
            z-index: 10;
            filter: drop-shadow(0 0 10px #ff0055);
        }

        #result {
            margin-top: 40px;
            font-size: 2.6rem;
            font-weight: 900;
            min-height: 60px;
            text-align: center;
        }

        #result.winner-active {
            animation: winner-glow 1s ease-out;
            color: var(--highlight);
            text-shadow: 0 0 15px var(--highlight), 0 0 30px var(--primary);
        }

        @keyframes winner-glow {
            0% { transform: scale(0.5); opacity: 0; filter: brightness(3); }
            50% { transform: scale(1.1); filter: brightness(1.5); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
        }
        
        /* Particle canvas setup */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <h1>True Random Lunch Picker</h1>
    <div class="container">
        <div class="controls">
            <label for="items">Wheel Entries</label>
            <textarea id="items">
Tahiti
Aupark
Euphoria
</textarea>
            <button id="updateBtn" onclick="drawWheel()">Apply Setup</button>
            <button id="spinBtn" onclick="spin()">SPIN THE WHEEL</button>
            <div id="status" class="status">Awaiting configuration.</div>
        </div>

        <div class="wheel-container">
            <canvas id="wheel" width="420" height="420"></canvas>
            <div class="pointer"></div>
        </div>
    </div>
    
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const updateBtn = document.getElementById('updateBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');

        let items = [];
        let currentRotation = 0;
        let isSpinning = false;
        
        // Dynamic Cosmic Palette
        const colors = ['#944ce8', '#c71cc7', '#ff0055', '#ff9f00', '#ffee00', '#00ffaa', '#00fff2', '#0088ff'];

        // Web Audio Setup for dynamic ticks
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTick(speedMultiplier) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'sine';
            // Frequency drops slightly as speed decreases
            const baseFreq = 400 + (speedMultiplier * 200);
            osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.04);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        // --- CONFETTI EFFECT ---
        let particles = [];
        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticleCanvas);
        resizeParticleCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() * 10 - 5) * 2;
                this.speedY = (Math.random() * -15 - 5);
                this.gravity = 0.4;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 10 - 5;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spin;
                this.size *= 0.98; // Shrink
            }
            draw() {
                pCtx.save();
                pCtx.translate(this.x, this.y);
                pCtx.rotate(this.angle * Math.PI / 180);
                pCtx.fillStyle = this.color;
                pCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                pCtx.restore();
            }
        }

        function burstConfetti() {
            initAudio(); // Just in case
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(centerX, centerY));
            }
            animateParticles();
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.size < 0.5) particles.splice(i, 1); // Remove small particles
            });
            if (particles.length > 0) {
                requestAnimationFrame(animateParticles);
            }
        }

        // --- WHEEL MECHANICS ---

        function drawWheel() {
            resultDiv.innerText = '';
            resultDiv.classList.remove('winner-active');
            const text = document.getElementById('items').value;
            items = text.split('\n').map(item => item.trim()).filter(item => item !== '');
            if (items.length === 0) items = ['Empty!'];

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            const sliceAngle = (2 * Math.PI) / items.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle inner glow for the wheel
            ctx.shadowColor = 'rgba(148, 76, 232, 0.4)';
            ctx.shadowBlur = 20;

            for (let i = 0; i < items.length; i++) {
                // Draw slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Inter, sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 8;
                ctx.fillText(items[i], radius - 40, 0);
                ctx.restore();
            }
            
            // Draw center cap
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
            ctx.fillStyle = '#160c29';
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
            statusDiv.innerText = `${items.length} entries loaded.`;
        }

        async function getTrueRandomDegree() {
            try {
                statusDiv.innerText = "Querying... 🌌";
                const response = await fetch('https://www.random.org/integers/?num=1&min=0&max=359&col=1&base=10&format=plain&rnd=new');
                if (!response.ok) throw new Error('API limit');
                return parseInt(await response.text(), 10);
            } catch (error) {
                statusDiv.innerText = "API Offline. Using quantum fluctuation backup.";
                return Math.floor(Math.random() * 360);
            }
        }

        async function spin() {
            if (isSpinning || items.length === 0) return;
            
            initAudio(); // Lock/unlock audio on user interaction
            isSpinning = true;
            spinBtn.disabled = true;
            updateBtn.disabled = true;
            spinBtn.classList.add('spinning');
            resultDiv.innerText = 'The atmospheric noise decides...';
            resultDiv.classList.remove('winner-active');
            
            const targetDegree = await getTrueRandomDegree();
            statusDiv.innerText = "SPINNING!";

            // Animation Config
            const fullSpins = 8;
            const targetRotation = currentRotation + (fullSpins * 360) + targetDegree;
            const duration = 6500; // 6.5 seconds for dramatic effect
            const sliceAngle = 360 / items.length;
            
            let lastTickSliceIndex = Math.floor(currentRotation / sliceAngle);
            const startTimestamp = performance.now();

            // Ease Out Quart (Slows down heavily at the end)
            const easeOutQuart = (t) => 1 - Math.pow(1 - t, 4);

            function animateSpin(currentTimestamp) {
                let elapsed = currentTimestamp - startTimestamp;
                let progress = Math.min(elapsed / duration, 1);
                let easeProgress = easeOutQuart(progress);
                
                let currentFrameRotation = currentRotation + (targetRotation - currentRotation) * easeProgress;
                canvas.style.transform = `rotate(${currentFrameRotation}deg)`;

                // --- Sound Mechanics ---
                let currentSliceIndex = Math.floor(currentFrameRotation / sliceAngle);
                if (currentSliceIndex > lastTickSliceIndex) {
                    // Calculate relative speed (1 is max, 0 is stopped)
                    const speedMultiplier = 1 - progress;
                    // Only play tick if it's not stopped
                    if (speedMultiplier > 0.01) {
                        playTick(speedMultiplier);
                    }
                    lastTickSliceIndex = currentSliceIndex;
                }

                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    currentRotation = targetRotation; // Lock final position
                    declareWinner();
                }
            }
            
            requestAnimationFrame(animateSpin);
        }

        function declareWinner() {
            const normalizedRotation = currentRotation % 360;
            // Reverse engineering the winning index because the wheel moves 'past' the pointer.
            const winningAngle = (360 - normalizedRotation) % 360;
            const sliceAngle = 360 / items.length;
            const winningIndex = Math.floor(winningAngle / sliceAngle);
            
            // Visual victory effects
            resultDiv.innerText = `🌌 WINNER: ${items[winningIndex]}! 🌌`;
            resultDiv.classList.add('winner-active');
            burstConfetti();

            statusDiv.innerText = "Ready for another spin.";
            isSpinning = false;
            spinBtn.disabled = false;
            updateBtn.disabled = false;
            spinBtn.classList.remove('spinning');
        }

        // --- START ---
        drawWheel();
    </script>
</body>
</html>
