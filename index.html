<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>True Random Picker</title>
    <style>
        :root {
            --glass-bg: rgba(20, 25, 35, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --highlight: #0ea5e9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            transition: background 0.6s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        body.theme-wheel { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        body.theme-slot { background: radial-gradient(circle at center, #450a0a 0%, #1a0202 100%); }
        body.theme-8ball { background: radial-gradient(circle at center, #170f2e 0%, #02010a 100%); }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 40px;
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            align-items: center;
            z-index: 10;
            max-width: 1000px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- CONTROLS --- */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
            flex-shrink: 0;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        select, textarea {
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        select:focus, textarea:focus {
            border-color: var(--highlight);
        }

        textarea {
            height: 140px;
            resize: none;
            white-space: pre;
        }

        .btn-spin {
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--highlight);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            touch-action: manipulation;
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled, textarea:disabled, select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .view-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 440px;
            height: 440px;
            flex-grow: 1;
        }

        /* --- WHEEL MODE --- */
        .wheel-wrapper { display: flex; position: relative; align-items: center; justify-content: center; width: 420px; height: 420px;}
        #wheel { border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.5); width: 100%; height: 100%; }
        .pointer {
            position: absolute; right: -15px; top: 50%; transform: translateY(-50%);
            width: 0; height: 0; 
            border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 30px solid #ef4444; 
            z-index: 10; filter: drop-shadow(-2px 2px 5px rgba(0,0,0,0.5));
        }

        /* --- SLOT MACHINE MODE --- */
        .slot-wrapper { display: none; align-items: center; justify-content: center; position: relative; }
        .slot-machine-frame {
            border: 12px solid #b91c1c; border-radius: 20px; padding: 10px;
            background: #222; box-shadow: 0 0 20px #ef4444, inset 0 0 15px #000; position: relative;
        }
        .slot-lights {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 4px dashed #fbbf24; border-radius: 24px;
            animation: flash 1s infinite alternate; pointer-events: none;
        }
        @keyframes flash { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .slot-screen {
            width: 260px; height: 180px; background: #000;
            border-radius: 8px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }
        .slot-reel { display: flex; flex-direction: column; width: 100%; }
        .slot-item {
            height: 90px; display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 800; color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8); text-align: center; padding: 0 10px; box-sizing: border-box;
        }
        .slot-center-line {
            position: absolute; top: 50%; left: 0; right: 0; height: 90px;
            transform: translateY(-50%); border-top: 2px solid #ef4444; border-bottom: 2px solid #ef4444;
            background: rgba(239, 68, 68, 0.1); pointer-events: none; z-index: 2;
        }
        
        .lever-container {
            position: absolute; right: -50px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 140px; cursor: pointer; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .lever-base {
            position: absolute; bottom: 20px; left: 0; width: 25px; height: 50px;
            background: #555; border-radius: 8px; box-shadow: inset -2px -2px 5px #222;
        }
        .lever-stick {
            position: absolute; bottom: 45px; left: 8px; width: 8px; height: 80px;
            background: #ccc; transform-origin: bottom center; transition: transform 0.4s cubic-bezier(0.3, 1.5, 0.6, 1);
        }
        .lever-ball {
            position: absolute; top: -15px; left: -11px; width: 30px; height: 30px;
            background: #ef4444; border-radius: 50%; box-shadow: inset -3px -3px 8px #991b1b;
        }
        .lever-container.pulled .lever-stick { transform: rotate(70deg); }

        /* --- MAGIC 8-BALL MODE --- */
        .ball-wrapper { display: none; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .magic-ball {
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle at 80px 80px, #4a4a5a, #050505);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset -20px -20px 40px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
        }
        .ball-wrapper.shaking .magic-ball { animation: shake 0.4s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            25% { transform: translate(-4px, 0px) rotate(-3deg); }
            50% { transform: translate(3px, -3px) rotate(3deg); }
            75% { transform: translate(-2px, 4px) rotate(-2deg); }
            100% { transform: translate(2px, -2px) rotate(0deg); }
        }
        .magic-window {
            width: 150px; height: 150px; border-radius: 50%;
            background: #00001a; border: 6px solid #111;
            box-shadow: inset 0 0 20px #000;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .magic-triangle {
            width: 0; height: 0;
            border-left: 50px solid transparent; border-right: 50px solid transparent;
            border-top: 85px solid #1e3a8a;
            position: relative; opacity: 0; transition: opacity 2s ease-in;
            filter: drop-shadow(0 0 10px rgba(30, 58, 138, 0.8));
        }
        .magic-triangle.revealed { opacity: 1; }
        .magic-text {
            position: absolute; top: -75px; left: -40px; width: 80px;
            text-align: center; color: #93c5fd; font-size: 13px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; height: 50px;
            text-shadow: 0 0 5px rgba(147, 197, 253, 0.5);
            overflow: hidden;
        }

        /* --- UI OVERLAYS --- */
        #result {
            margin-top: 20px; font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 800;
            min-height: 40px; text-align: center; z-index: 10; padding: 0 10px;
        }
        .winner-active { animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; color: #10b981; }
        @keyframes pop-in { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .status { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: -5px; }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .container { flex-direction: column; gap: 20px; padding: 20px; }
            .controls { width: 100%; }
            .view-container { width: 100%; height: 320px; }
            .wheel-wrapper { transform: scale(0.75); }
            .slot-wrapper { transform: scale(0.8); transform-origin: center center; margin-left: -20px; }
            .ball-wrapper { transform: scale(0.8); }
        }
    </style>
</head>
<body class="theme-wheel">

    <canvas id="particleCanvas"></canvas>

    <h1>True Random Picker</h1>
    
    <div class="container">
        <div class="controls">
            <label for="modeSelect">Display Mode</label>
            <select id="modeSelect" onchange="changeMode()">
                <option value="wheel">🎡 Circular Wheel</option>
                <option value="slot">🎰 Slot Machine</option>
                <option value="8ball">🎱 Magic 8-Ball</option>
            </select>

            <label for="items">
                <span>Entries</span>
                <span id="entryCount">0 / 100</span>
            </label>
            <textarea id="items" oninput="updateView()" placeholder="Enter items here...
One per line
Max 100 lines">
Aupark
Tahiti
Euphoria
</textarea>
            
            <button id="spinBtn" class="btn-spin" onclick="spin()">Spin Wheel</button>
            <div id="status" class="status">Waiting for input...</div>
        </div>

        <div class="view-container">
            <div id="wheelWrapper" class="wheel-wrapper">
                <canvas id="wheel" width="420" height="420"></canvas>
                <div class="pointer"></div>
            </div>

            <div id="slotWrapper" class="slot-wrapper">
                <div class="slot-machine-frame">
                    <div class="slot-lights"></div>
                    <div class="slot-screen">
                        <div class="slot-center-line"></div>
                        <div id="slotReel" class="slot-reel"></div>
                    </div>
                    <div id="lever" class="lever-container" onclick="spin()" ontouchstart="spin()">
                        <div class="lever-base"></div>
                        <div class="lever-stick"><div class="lever-ball"></div></div>
                    </div>
                </div>
            </div>

            <div id="ballWrapper" class="ball-wrapper" onclick="spin()" ontouchstart="spin()">
                <div class="magic-ball">
                    <div class="magic-window">
                        <div id="magicTriangle" class="magic-triangle">
                            <div id="magicText" class="magic-text"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="result"></div>

    <script>
        const modeSelect = document.getElementById('modeSelect');
        const itemInput = document.getElementById('items');
        const entryCount = document.getElementById('entryCount');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        
        const wheelWrapper = document.getElementById('wheelWrapper');
        const slotWrapper = document.getElementById('slotWrapper');
        const ballWrapper = document.getElementById('ballWrapper');
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const slotReel = document.getElementById('slotReel');
        const lever = document.getElementById('lever');
        const magicTriangle = document.getElementById('magicTriangle');
        const magicText = document.getElementById('magicText');

        let items = [];
        let currentMode = 'wheel';
        let isSpinning = false;
        let wheelRotation = 0;
        let slotTranslateY = 0;
        const slotItemHeight = 90;
        const maxItems = 100;
        const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'];

        // --- SYNTHESIZED AUDIO SYSTEM ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type, param = 0) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'tick') {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400 + (param * 200), now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.05);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } 
            else if (type === 'clack') {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.03);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.03);
                osc.start(now); osc.stop(now + 0.03);
            }
            else if (type === 'rumble') {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, now);
                osc.frequency.linearRampToValueAtTime(40, now + 1.5);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.4, now + 0.2);
                gainNode.gain.linearRampToValueAtTime(0, now + 1.5);
                osc.start(now); osc.stop(now + 1.5);
            }
            else if (type === 'win-wheel') {
                // Cheerful Major Arpeggio (Ta-da!)
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0, now + i * 0.1);
                    gainNode.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.05);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.6);
                    osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.6);
                });
            }
            else if (type === 'win-slot') {
                // Cascading Jackpot Rings
                for (let i = 0; i < 12; i++) {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.type = 'square';
                    osc.frequency.value = (i % 2 === 0) ? 1200 : 1600;
                    gainNode.gain.setValueAtTime(0, now + i * 0.08);
                    gainNode.gain.linearRampToValueAtTime(0.06, now + i * 0.08 + 0.02);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
                    osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.15);
                }
            }
            else if (type === 'win-8ball') {
                // Mystical Ethereal Swell
                [440, 554.37, 659.25].forEach((freq) => { // A Major chord
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                    osc.type = 'triangle';
                    osc.frequency.value = freq + (Math.random() * 4 - 2); // Slight detune for shimmer
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.15, now + 1.0); // Swell in
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 3.0); // Long fade
                    osc.start(now); osc.stop(now + 3.0);
                });
            }
        }

        // --- CORE LOGIC ---

        function getParsedItems() {
            let rawLines = itemInput.value.split('\n').map(i => i.trim()).filter(i => i !== '');
            if (rawLines.length > maxItems) rawLines = rawLines.slice(0, maxItems);
            if (rawLines.length === 0) rawLines = ['Empty'];
            return rawLines;
        }

        function changeMode() {
            initAudio();
            currentMode = modeSelect.value;
            document.body.className = `theme-${currentMode}`;
            
            wheelWrapper.style.display = currentMode === 'wheel' ? 'flex' : 'none';
            slotWrapper.style.display = currentMode === 'slot' ? 'flex' : 'none';
            ballWrapper.style.display = currentMode === '8ball' ? 'flex' : 'none';
            
            if (currentMode === 'slot') {
                spinBtn.style.display = 'none';
                statusDiv.innerText = "Pull the lever to spin.";
            } else if (currentMode === '8ball') {
                spinBtn.style.display = 'block';
                spinBtn.innerText = "Shake 8-Ball";
                statusDiv.innerText = "Tap or shake the ball to reveal.";
            } else {
                spinBtn.style.display = 'block';
                spinBtn.innerText = "Spin Wheel";
                statusDiv.innerText = "Ready to spin.";
            }
            updateView();
        }

        function updateView() {
            if (isSpinning) return;
            items = getParsedItems();
            entryCount.innerText = `${items.length} / 100`;
            resultDiv.innerText = '';
            resultDiv.classList.remove('winner-active');
            magicTriangle.classList.remove('revealed');

            if (currentMode === 'wheel') drawWheel();
            else if (currentMode === 'slot') drawSlot();
            else if (currentMode === '8ball') magicText.innerText = '';
        }

        // --- RENDERERS ---

        function drawWheel() {
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            const sliceAngle = (2 * Math.PI) / items.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < items.length; i++) {
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, centerX, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = colors[i % colors.length]; ctx.fill(); ctx.stroke();
                ctx.save(); ctx.translate(centerX, centerY); ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#ffffff'; 
                const fontSize = items.length > 50 ? 12 : items.length > 25 ? 16 : 22;
                ctx.font = `bold ${fontSize}px Inter, sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
                ctx.fillText(items[i], centerX - 30, 0); ctx.restore();
            }
            ctx.beginPath(); ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#111'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        }

        function drawSlot() {
            slotReel.innerHTML = '';
            for(let loop = 0; loop < 10; loop++) {
                items.forEach((text, index) => {
                    const div = document.createElement('div');
                    div.className = 'slot-item';
                    div.innerText = text;
                    div.style.color = colors[index % colors.length];
                    slotReel.appendChild(div);
                });
            }
            slotTranslateY = 0;
            slotReel.style.transform = `translateY(0px)`;
        }

        async function fetchTrueRandomIndex() {
            try {
                statusDiv.innerText = "Fetching randomness from atmospheric noise...";
                const response = await fetch('https://www.random.org/integers/?num=1&min=0&max=10000&col=1&base=10&format=plain&rnd=new');
                if (!response.ok) throw new Error('API limit');
                const rawNum = parseInt(await response.text(), 10);
                return rawNum % items.length;
            } catch (error) {
                statusDiv.innerText = "API Offline. Using Math.random fallback.";
                return Math.floor(Math.random() * items.length);
            }
        }

        // --- ANIMATIONS & PHYSICS ---

        async function spin(event) {
            if (event) event.preventDefault();
            if (isSpinning || items.length === 0 || items[0] === 'Empty') return;
            initAudio(); 
            isSpinning = true;
            toggleInputs(true);
            resultDiv.innerText = 'Calculating...';
            resultDiv.classList.remove('winner-active');
            magicTriangle.classList.remove('revealed');
            
            if(currentMode === 'slot') {
                lever.classList.add('pulled');
                playSound('clack');
                setTimeout(() => lever.classList.remove('pulled'), 400);
            } else if (currentMode === '8ball') {
                ballWrapper.classList.add('shaking');
                playSound('rumble');
            }
            
            const winningIndex = await fetchTrueRandomIndex();
            statusDiv.innerText = "Revealing result...";
            
            if (currentMode === 'wheel') animateWheel(winningIndex);
            else if (currentMode === 'slot') animateSlot(winningIndex);
            else if (currentMode === '8ball') animate8Ball(winningIndex);
        }

        function toggleInputs(disabled) {
            spinBtn.disabled = disabled; itemInput.disabled = disabled; modeSelect.disabled = disabled;
        }

        function animateWheel(winningIndex) {
            const startTimestamp = performance.now();
            const duration = 5000;
            const sliceDegree = 360 / items.length;
            const targetDegree = 360 - (winningIndex * sliceDegree) - (sliceDegree / 2); 
            const targetRotation = wheelRotation + (8 * 360) + targetDegree;
            let lastTickSlice = Math.floor(wheelRotation / sliceDegree);

            const easeOut = t => 1 - Math.pow(1 - t, 4);

            function step(timestamp) {
                let progress = Math.min((timestamp - startTimestamp) / duration, 1);
                let currentFrameRotation = wheelRotation + (targetRotation - wheelRotation) * easeOut(progress);
                canvas.style.transform = `rotate(${currentFrameRotation}deg)`;

                let currentSlice = Math.floor(currentFrameRotation / sliceDegree);
                if (currentSlice > lastTickSlice) {
                    if (1 - progress > 0.02) playSound('tick', 1 - progress);
                    lastTickSlice = currentSlice;
                }

                if (progress < 1) requestAnimationFrame(step);
                else {
                    wheelRotation = targetRotation % 360;
                    finishSpin(winningIndex);
                }
            }
            requestAnimationFrame(step);
        }

        function animateSlot(winningIndex) {
            const startTimestamp = performance.now();
            const duration = 4000;
            const totalItemsToScroll = (7 * items.length) + winningIndex;
            const targetTranslateY = -((totalItemsToScroll * slotItemHeight) - (slotItemHeight / 2));
            let lastTickItem = Math.floor(Math.abs(slotTranslateY) / slotItemHeight);

            const easeOut = t => 1 - Math.pow(1 - t, 3);

            function step(timestamp) {
                let progress = Math.min((timestamp - startTimestamp) / duration, 1);
                let currentFrameY = slotTranslateY + (targetTranslateY - slotTranslateY) * easeOut(progress);
                slotReel.style.transform = `translateY(${currentFrameY}px)`;

                let currentItem = Math.floor(Math.abs(currentFrameY) / slotItemHeight);
                if (currentItem > lastTickItem) {
                    if (1 - progress > 0.05) playSound('clack');
                    lastTickItem = currentItem;
                }

                if (progress < 1) requestAnimationFrame(step);
                else {
                    slotTranslateY = -((winningIndex * slotItemHeight) - (slotItemHeight / 2));
                    slotReel.style.transform = `translateY(${slotTranslateY}px)`;
                    finishSpin(winningIndex);
                }
            }
            requestAnimationFrame(step);
        }

        function animate8Ball(winningIndex) {
            setTimeout(() => {
                ballWrapper.classList.remove('shaking');
                magicText.innerText = items[winningIndex];
                magicTriangle.classList.add('revealed');
                setTimeout(() => finishSpin(winningIndex), 2000);
            }, 1500);
        }

        function finishSpin(winningIndex) {
            playSound('win-' + currentMode); // Plays the specific sound for the active mode
            resultDiv.innerText = `Winner: ${items[winningIndex]}`;
            resultDiv.classList.add('winner-active');
            burstConfetti();
            statusDiv.innerText = currentMode === 'slot' ? "Pull lever to spin again." : "Ready for another spin.";
            isSpinning = false; toggleInputs(false);
        }

        // --- CONFETTI SYSTEM ---
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];
        
        function resize() { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() * 10 - 5) * 2;
                this.speedY = (Math.random() * -15 - 5);
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.angle = Math.random() * 360; this.spin = Math.random() * 10 - 5;
            }
            update() {
                this.speedY += 0.4; this.x += this.speedX; this.y += this.speedY;
                this.angle += this.spin; this.size *= 0.98;
            }
            draw() {
                pCtx.save(); pCtx.translate(this.x, this.y); pCtx.rotate(this.angle * Math.PI / 180);
                pCtx.fillStyle = this.color; pCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size); pCtx.restore();
            }
        }

        function burstConfetti() {
            const rect = document.querySelector('.view-container').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            particles = [];
            for (let i = 0; i < 100; i++) particles.push(new Particle(centerX, centerY));
            animateParticles();
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach((p, i) => { p.update(); p.draw(); if (p.size < 0.5) particles.splice(i, 1); });
            if (particles.length > 0) requestAnimationFrame(animateParticles);
        }

        // Initialize on load
        changeMode();
    </script>
</body>
</html>
