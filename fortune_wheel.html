<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern True Random Wheel</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 50px;
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            align-items: center;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 280px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            height: 180px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .wheel-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 420px;
            height: 420px;
        }

        .wheel-shadow {
            position: absolute;
            width: 390px;
            height: 390px;
            border-radius: 50%;
            background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            z-index: 0;
        }

        canvas {
            border-radius: 50%;
            z-index: 1;
            /* Animation is now handled by JS, not CSS transition */
        }

        .center-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #1e293b;
            border: 4px solid white;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .pointer {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 0; 
            height: 0; 
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 35px solid #ef4444; /* Modern red */
            z-index: 10;
            filter: drop-shadow(-4px 4px 4px rgba(0,0,0,0.4));
        }

        #result {
            margin-top: 30px;
            font-size: 2rem;
            font-weight: bold;
            color: #10b981; /* Emerald green */
            min-height: 48px;
            text-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }

        .status {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <h1>Lunch picker</h1>
    <div class="container">
        <div class="controls">
            <label for="items">Wheel Entries</label>
            <textarea id="items">Pizza
Burgers
Sushi
Tacos
Salad
Pasta</textarea>
            <button onclick="drawWheel()">Apply Changes</button>
            <button id="spinBtn" onclick="spin()">Spin the Wheel</button>
            <div id="status" class="status">Awaiting input...</div>
        </div>

        <div class="wheel-container">
            <div class="wheel-shadow"></div>
            <canvas id="wheel" width="400" height="400"></canvas>
            <div class="center-dot"></div>
            <div class="pointer"></div>
        </div>
    </div>
    
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        
        let items = [];
        let currentRotation = 0;
        let isSpinning = false;
        
        // Modern, vibrant color palette
        const colors = ['#FF3366', '#FF9933', '#20D070', '#00C3FF', '#7A5FFF', '#F15BB5', '#00F5D4', '#FEE440'];

        // Web Audio API context for the tick sound
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Create a short, clicky "tick" sound
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function drawWheel() {
            const text = document.getElementById('items').value;
            items = text.split('\n').map(item => item.trim()).filter(item => item !== '');
            if (items.length === 0) items = ['Empty!'];

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            const sliceAngle = (2 * Math.PI) / items.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < items.length; i++) {
                // Draw slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();

                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px Inter, sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.fillText(items[i], radius - 30, 0);
                ctx.restore();
            }
        }

        async function getTrueRandomDegree() {
            try {
                statusDiv.innerText = "Connecting to universe... 🌌";
                const response = await fetch('https://www.random.org/integers/?num=1&min=0&max=359&col=1&base=10&format=plain&rnd=new');
                if (!response.ok) throw new Error('API limit');
                return parseInt(await response.text(), 10);
            } catch (error) {
                statusDiv.innerText = "Using offline RNG fallback.";
                return Math.floor(Math.random() * 360);
            }
        }

        async function spin() {
            if (isSpinning || items.length === 0) return;
            
            initAudio(); // Required by browsers to unlock audio context on click
            isSpinning = true;
            spinBtn.disabled = true;
            resultDiv.innerText = '';
            
            const targetDegree = await getTrueRandomDegree();
            statusDiv.innerText = "Spinning!";

            // JS Animation logic
            const spins = 6 * 360; // 6 full rotations
            const targetRotation = currentRotation + spins + targetDegree;
            const duration = 5000; // 5 seconds
            const sliceAngle = 360 / items.length;
            
            let lastSliceIndex = Math.floor(currentRotation / sliceAngle);
            const startTimestamp = performance.now();

            // Custom easing function (Starts fast, slows down smoothly)
            const easeOutQuart = (t) => 1 - Math.pow(1 - t, 4);

            function animate(currentTimestamp) {
                let elapsed = currentTimestamp - startTimestamp;
                let progress = Math.min(elapsed / duration, 1);
                let easeProgress = easeOutQuart(progress);
                
                let currentFrameRotation = currentRotation + (targetRotation - currentRotation) * easeProgress;
                canvas.style.transform = `rotate(${currentFrameRotation}deg)`;

                // Check if we crossed into a new slice to play the tick sound
                let currentSliceIndex = Math.floor(currentFrameRotation / sliceAngle);
                if (currentSliceIndex > lastSliceIndex) {
                    playTick();
                    lastSliceIndex = currentSliceIndex;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotation; // Save final position
                    declareWinner();
                }
            }
            
            requestAnimationFrame(animate);
        }

        function declareWinner() {
            const normalizedRotation = currentRotation % 360;
            // The pointer is at 0 degrees. The slice at the pointer is moving 'backwards'
            // relative to the rotation direction.
            const winningAngle = (360 - normalizedRotation) % 360;
            const sliceAngle = 360 / items.length;
            const winningIndex = Math.floor(winningAngle / sliceAngle);
            
            resultDiv.innerText = `Winner: ${items[winningIndex]}!`;
            statusDiv.innerText = "Ready for another spin.";
            isSpinning = false;
            spinBtn.disabled = false;
        }

        // Initialize wheel
        drawWheel();
    </script>
</body>
</html>
